services:
  claude-sandbox:
    build: .
    container_name: claude-sandbox
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./workspace:/workspace
      - ./claude-auth:/root/.claude
    networks:
      - sandbox-net
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"

networks:
  sandbox-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: claude-br0
